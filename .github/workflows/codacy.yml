name: Codacy Security Scan

on:
  push:
    branches: [ "dev", "release", "protect_release_branch" ]
  pull_request:
    branches: [ "dev", "release" ]
  schedule:
    - cron: '19 10 * * 6'

jobs:
  codacy-security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis
        uses: docker://codacy/codacy-analysis-cli:latest
        env:
          PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        with:
          args: >-
            analyze
            --project-token $PROJECT_TOKEN
            --verbose
            --output /github/workspace/codacy-results.sarif
            --format sarif
            --gh-code-scanning-compat true
            --max-allowed-issues 2147483647
            /github/workspace/API-Core

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codacy-results.sarif